name: Java CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [created]  # Release 创建时触发

jobs:
  buildJar:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须：允许上传 Release Asset

    steps:
      - uses: actions/checkout@v4

      - name: Set up PATH
        run: |
          echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Build mod jar
        run: bash ./gradlew jar

      # 确认实际生成的文件名
      - name: List build outputs
        run: ls -la build/libs/

      - name: Upload built jar file (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: build/libs/*.jar  # 通配符匹配，避免文件名不对

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "TestAutoBuild"
          files: build/libs/*.jar  # 通配符匹配所有 jar
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}