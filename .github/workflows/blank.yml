name: Java CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [created]

jobs:
  buildJar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up PATH
        run: |
          echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Build mod jar
        run: bash ./gradlew deployGithub

      # 确认实际生成的文件名
      - name: List build outputs
        run: ls -la build/libs/

      - name: Upload built jar file (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: build/libs/*.jar  # 通配符匹配，避免文件名不对

      - name: Generate timestamp tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d-%H%M')"
          echo "tag_time=$TAG" >> $GITHUB_OUTPUT       

      - name: Get push title and description
        id: push_info
        shell: bash
        run: |
          MESSAGE="$(jq -r '.head_commit.message' "$GITHUB_EVENT_PATH")"

          TITLE="$(printf "%s" "$MESSAGE" | head -n 1)"
          BODY="$(printf "%s" "$MESSAGE" | tail -n +2 | sed '/./,$!d')"

          # 用 commit 标题生成安全的 tag 名称
          TAG_NAME="$(printf "%s" "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[[:space:]]\+/-/g' \
            | sed 's/[^a-zA-Z0-9._-]//g')"

          # 如果 tag_name 为空，使用 SHA 前 7 位作为 tag
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="release-${GITHUB_SHA::7}"
          fi

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          # 生成 release 描述文件
          cat > release_body.md <<EOF
          $BODY
          EOF

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.push_info.outputs.tag_name }}
          name: ${{ steps.push_info.outputs.title }}
          body_path: release_body.md
          files: build/libs/*.jar
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}