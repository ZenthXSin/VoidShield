name: Java CI

on:
  push:
    branches: [main, master]
  # ❌ 删除这两行，PR 不需要发 release
  # pull_request:
  #   branches: [main, master]
  # ❌ 删除 release 触发器，避免和 action-gh-release 冲突
  # release:
  #   types: [created]

jobs:
  buildJar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up PATH
        run: |
          echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Build mod jar
        run: bash ./gradlew deployGithub

      - name: List build outputs
        run: ls -la build/libs/

      - name: Upload built jar file (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: build/libs/*.jar

      - name: Generate safe tag and release info
        id: release_info
        shell: bash
        run: |
          # 获取 commit 信息
          MESSAGE="$(jq -r '.head_commit.message' "$GITHUB_EVENT_PATH" 2>/dev/null || echo 'Auto Build')"
          TITLE="$(printf "%s" "$MESSAGE" | head -n 1)"
          BODY="$(printf "%s" "$MESSAGE" | tail -n +2 | sed '/./,$!d')"

          # 生成安全的 tag 名称：
          # 1. 转小写，空格变 -
          # 2. 非字母数字变 -
          # 3. 合并连续的 -
          # 4. 去除开头和结尾的 - 和 .
          SAFE_TAG="$(printf "%s" "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^[-.]*//;s/[-.]*$//')"

          # 如果 commit 全是中文，SAFE_TAG 为空，用固定前缀
          if [ -z "$SAFE_TAG" ]; then
            SAFE_TAG="build"
          fi

          # 加上时间戳确保唯一性，且不以 - 结尾
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          TAG_NAME="${SAFE_TAG}-${TIMESTAMP}"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          # 生成 release body
          cat > release_body.md <<EOF
          $BODY
          EOF

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.title }}
          body_path: release_body.md
          files: build/libs/*.jar
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}